<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="blood-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc0000;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Main Drop Shape -->
  <path d="M256,32 
           C256,32 64,200 64,344 
           C64,448 150,512 256,512 
           C362,512 448,448 448,344 
           C448,200 256,32 256,32 Z" 
        fill="url(#blood-gradient)" 
        filter="url(#glow)"
        stroke="#ff6666" stroke-width="4"/>
        
  <!-- Shine Effect -->
  <path d="M180,180 Q220,150 256,120" 
        stroke="rgba(255,255,255,0.4)" 
        stroke-width="12" 
        stroke-linecap="round"
        fill="none" />
</svg>
